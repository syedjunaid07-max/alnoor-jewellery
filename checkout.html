<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - AL NOOR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
    padding-top:100px;
    overflow-x:hidden;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
    z-index:1000;
    border-bottom:1px solid #222;
}

.left-section{
    display:flex;
    align-items:center;
    gap:20px;
}

.menu-icon{
    font-size:24px;
    cursor:pointer;
    color:#d4af37;
}

.logo{
    font-family:'Cinzel',serif;
    font-size:30px;
    color:#d4af37;
    font-weight:700;
}

.nav-links a{
    text-decoration:none;
    color:white;
    margin-left:20px;
    transition:0.3s;
    font-weight:500;
}

.nav-links a:hover{
    color:#d4af37;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#111;
    padding-top:70px;
    transition:0.3s;
    z-index:2000;
}

.close-sidebar{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    color:white;
    cursor:pointer;
}

.sidebar a{
    display:block;
    color:white;
    padding:18px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:#d4af37;
    color:black;
}

/* MAIN */

.checkout-container{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* FORM */

.form-section{
    background:#1a1a1a;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.form-section h2{
    color:#d4af37;
    margin-bottom:25px;
    font-family:'Cinzel',serif;
    font-size:32px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#ddd;
}

.input-box input,
.input-box textarea,
.input-box select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#111;
    color:white;
    border:1px solid #333;
}

/* ORDER */

.order-section{
    background:#1a1a1a;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    height:fit-content;
}

.order-section h2{
    color:#d4af37;
    margin-bottom:25px;
    font-family:'Cinzel',serif;
    font-size:32px;
}

.order-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    border-bottom:1px solid #333;
    padding-bottom:12px;
    color:#ddd;
    line-height:1.7;
}

.total{
    margin-top:25px;
    font-size:24px;
    font-weight:600;
    color:#d4af37;
}

.place-btn{
    width:100%;
    padding:15px;
    background:#d4af37;
    color:black;
    border:none;
    border-radius:10px;
    margin-top:30px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.place-btn:hover{
    background:white;
    transform:scale(1.02);
}

/* FOOTER */

.footer{
    background:black;
    text-align:center;
    padding:35px 20px;
    margin-top:80px;
    border-top:1px solid #222;
}

.footer h3{
    color:#d4af37;
    margin-bottom:12px;
    font-family:'Cinzel',serif;
    font-size:28px;
}

.footer p{
    color:#aaa;
    font-size:15px;
    margin-bottom:10px;
}

/* MOBILE */

@media(max-width:900px){

    .header{
        flex-direction:column;
        gap:15px;
        padding:15px;
    }

    .checkout-container{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar">

    <div class="close-sidebar" onclick="closeMenu()">✖</div>

    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="About.html">About</a>
    <a href="login.html">Sign In</a>

</div>

<!-- HEADER -->

<div class="header">

    <div class="left-section">

        <div class="menu-icon" onclick="toggleMenu()">☰</div>

        <div class="logo">AL NOOR</div>

    </div>

    <div class="nav-links">

        <a href="home.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="login.html">Sign In</a>

    </div>

</div>

<!-- CHECKOUT -->

<div class="checkout-container">

    <!-- FORM -->

    <div class="form-section">

        <h2>Delivery Details</h2>

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number">
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea id="address" rows="4" placeholder="Enter address"></textarea>
        </div>

        <div class="input-box">
            <label>City</label>
            <input type="text" id="city" placeholder="Enter city">
        </div>

        <div class="input-box">
            <label>Pincode</label>
            <input type="text" id="pincode" placeholder="Enter pincode">
        </div>

        <div class="input-box">
            <label>Payment Method</label>

            <select id="payment">

                <option>Cash On Delivery</option>
                <option>UPI</option>
                <option>Credit/Debit Card</option>

            </select>

        </div>

    </div>

    <!-- ORDER SUMMARY -->

    <div class="order-section">

        <h2>Order Summary</h2>

        <div id="orderItems"></div>

        <div class="total">
            Total: ₹<span id="totalPrice">0</span>
        </div>

        <button class="place-btn" onclick="placeOrder()">
            Place Order
        </button>

    </div>

</div>

<!-- FOOTER -->

<div class="footer">

    <h3>AL NOOR Jewellery</h3>

    <p>
        Luxury Jewellery | Elegant Designs | Premium Collection
    </p>

    <p>
        © 2026 AL NOOR. All Rights Reserved.
    </p>

</div>

<script>

/* SIDEBAR */

function toggleMenu(){

    let s=document.getElementById("sidebar");

    s.style.left = s.style.left==="0px" ? "-250px" : "0px";
}

function closeMenu(){

    document.getElementById("sidebar").style.left="-250px";
}

/* GET CART */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let orderItems = document.getElementById("orderItems");

let total = 0;

/* LOAD ITEMS */

cart.forEach((item)=>{

    let quantity = item.quantity || 1;

    let subtotal = item.price * quantity;

    total += subtotal;

    orderItems.innerHTML += `

    <div class="order-item">

        <div>
            ${item.name}
            <br>
            Qty: ${quantity}
        </div>

        <div>
            ₹${subtotal}
        </div>

    </div>

    `;

});

/* TOTAL */

document.getElementById("totalPrice").innerText = total;

/* PLACE ORDER */

async function placeOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let city = document.getElementById("city").value;
    let pincode = document.getElementById("pincode").value;
    let payment = document.getElementById("payment").value;

    if(name==="" || phone==="" || address==="" || city==="" || pincode===""){

        alert("Please fill all details");
        return;
    }

    let orderData = {

        name,
        phone,
        address,
        city,
        pincode,
        payment,
        products: cart,
        total

    };

    try{

        let response = await fetch("http://localhost:5000/place-order",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(orderData)

        });

        let data = await response.json();

        alert(data.message);

        localStorage.removeItem("cart");

        window.location.href="ordersuccess.html";

    }catch(err){

        alert("Server Error");

    }

}

</script>

</body>
</html>
