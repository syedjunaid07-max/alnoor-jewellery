<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - AL NOOR</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
    padding-top:80px;
    overflow-x:hidden;
}

body::-webkit-scrollbar{ width:8px; }
body::-webkit-scrollbar-thumb{ background:#d4af37; border-radius:10px; }

/* ─── HEADER ─── */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 40px;
    background:rgba(0,0,0,0.92);
    backdrop-filter:blur(10px);
    z-index:1000;
    border-bottom:1px solid #222;
    gap:16px;
}

.left-section{
    display:flex;
    align-items:center;
    gap:16px;
    flex-shrink:0;
}

.menu-icon{
    font-size:24px;
    cursor:pointer;
    color:#d4af37;
    line-height:1;
}

.logo{
    font-family:'Cinzel',serif;
    font-size:26px;
    color:#d4af37;
    font-weight:700;
    white-space:nowrap;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:4px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    padding:6px 12px;
    transition:0.3s;
    font-weight:500;
    font-size:15px;
    white-space:nowrap;
}

.nav-links a:hover{ color:#d4af37; }

/* ─── SIDEBAR ─── */

.sidebar{
    position:fixed;
    left:-270px;
    top:0;
    width:260px;
    height:100%;
    background:#111;
    padding-top:70px;
    transition:0.3s;
    z-index:2000;
    box-shadow:4px 0 20px rgba(0,0,0,0.5);
}

.sidebar-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:1999;
}

.sidebar-overlay.active{ display:block; }

.close-sidebar{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    color:white;
    cursor:pointer;
}

.sidebar a{
    display:block;
    color:white;
    padding:16px 20px;
    text-decoration:none;
    transition:0.3s;
    font-size:15px;
    border-bottom:1px solid #1a1a1a;
}

.sidebar a:hover{
    background:#d4af37;
    color:black;
}

/* ─── CHECKOUT LAYOUT ─── */

.checkout-container{
    width:92%;
    max-width:1200px;
    margin:40px auto 80px;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
    align-items:start;
}

/* ─── FORM SECTION ─── */

.form-section{
    background:#1a1a1a;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.form-section h2{
    color:#d4af37;
    margin-bottom:25px;
    font-family:'Cinzel',serif;
    font-size:clamp(24px, 3vw, 32px);
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#ddd;
    font-size:14px;
}

.input-box input,
.input-box textarea,
.input-box select{
    width:100%;
    padding:14px;
    border:1px solid #333;
    border-radius:10px;
    outline:none;
    background:#111;
    color:white;
    font-size:14px;
    font-family:'Poppins',sans-serif;
    transition:border-color 0.3s;
}

.input-box input:focus,
.input-box textarea:focus,
.input-box select:focus{
    border-color:#d4af37;
}

.input-box textarea{
    resize:vertical;
    min-height:100px;
}

.input-box select option{
    background:#111;
}

/* ─── ORDER SECTION ─── */

.order-section{
    background:#1a1a1a;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    position:sticky;
    top:90px;
}

.order-section h2{
    color:#d4af37;
    margin-bottom:25px;
    font-family:'Cinzel',serif;
    font-size:clamp(22px, 3vw, 30px);
}

.order-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:15px;
    border-bottom:1px solid #333;
    padding-bottom:12px;
    color:#ddd;
    line-height:1.7;
    gap:10px;
    font-size:14px;
}

.order-item span:last-child{
    color:#d4af37;
    font-weight:600;
    white-space:nowrap;
}

.total{
    margin-top:25px;
    font-size:clamp(18px, 2.5vw, 24px);
    font-weight:600;
    color:#d4af37;
}

.place-btn{
    width:100%;
    padding:15px;
    background:#d4af37;
    color:black;
    border:none;
    border-radius:10px;
    margin-top:25px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
    font-family:'Poppins',sans-serif;
}

.place-btn:hover{
    background:white;
    transform:scale(1.02);
}

/* ─── TOAST ─── */

.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#d4af37;
    color:black;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
    z-index:5000;
    font-size:14px;
    max-width:calc(100vw - 40px);
}

.toast.show{ opacity:1; }

/* ─── FOOTER ─── */

.footer{
    background:black;
    text-align:center;
    padding:40px 20px;
    border-top:1px solid #222;
}

.footer h3{
    color:#d4af37;
    margin-bottom:10px;
    font-family:'Cinzel',serif;
    font-size:clamp(20px, 3vw, 28px);
}

.footer p{
    color:#aaa;
    font-size:14px;
    margin-top:8px;
}

/* ════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════ */

/* ── Large Tablet (max 1024px) ── */
@media(max-width:1024px){
    .header{ padding:14px 24px; gap:12px; }
    .logo{ font-size:22px; }
    .checkout-container{ gap:20px; }
}

/* ── Tablet (max 768px) ── */
@media(max-width:768px){

    .header{
        flex-wrap:wrap;
        padding:12px 16px;
        gap:10px;
    }

    .left-section{ gap:12px; flex:1; }

    .logo{ font-size:20px; }

    /* Hide nav links — sidebar takes over */
    .nav-links{ display:none; }

    /* Stack checkout into single column */
    .checkout-container{
        grid-template-columns:1fr;
        margin:24px auto 60px;
    }

    /* Unstick order summary on tablet */
    .order-section{ position:static; }

    .form-section,
    .order-section{ padding:24px; }
}

/* ── Mobile (max 480px) ── */
@media(max-width:480px){

    body{ padding-top:70px; }

    .header{ padding:10px 14px; gap:8px; }

    .logo{ font-size:18px; }

    .checkout-container{
        width:95%;
        margin:20px auto 50px;
        gap:16px;
    }

    .form-section,
    .order-section{
        padding:18px 16px;
        border-radius:14px;
    }

    .form-section h2,
    .order-section h2{
        font-size:20px;
        margin-bottom:18px;
    }

    .input-box{ margin-bottom:16px; }

    .input-box input,
    .input-box textarea,
    .input-box select{
        padding:12px;
        font-size:13px;
    }

    .input-box label{ font-size:13px; }

    .total{ font-size:18px; }

    .place-btn{
        padding:13px;
        font-size:15px;
        margin-top:20px;
    }

    .order-item{ font-size:13px; }

    .toast{ bottom:12px; right:12px; left:12px; text-align:center; }
}

/* ── Very small (max 360px) ── */
@media(max-width:360px){
    .logo{ font-size:16px; }
    .form-section,
    .order-section{ padding:14px 12px; }
}

</style>
</head>

<body>

<div class="toast" id="toast"></div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="close-sidebar" onclick="closeMenu()">✖</div>
    <a href="index.html">🏠 Home</a>
    <a href="shop.html">🛍️ Shop</a>
    <a href="About.html">ℹ️ About</a>
    <a href="login.html">🔑 Sign In</a>
</div>

<!-- HEADER -->
<div class="header">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="logo">AL NOOR</div>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="About.html">About</a>
        <a href="login.html">Sign In</a>
    </div>
</div>

<!-- CHECKOUT -->
<div class="checkout-container">

    <!-- FORM -->
    <div class="form-section">
        <h2>Delivery Details</h2>

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number">
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea id="address" rows="4" placeholder="Enter address"></textarea>
        </div>

        <div class="input-box">
            <label>City</label>
            <input type="text" id="city" placeholder="Enter city">
        </div>

        <div class="input-box">
            <label>Pincode</label>
            <input type="text" id="pincode" placeholder="Enter pincode">
        </div>

        <div class="input-box">
            <label>Payment Method</label>
            <select id="payment">
                <option>Cash On Delivery</option>
                <option>UPI</option>
                <option>Credit/Debit Card</option>
            </select>
        </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="order-section">
        <h2>Order Summary</h2>
        <div id="orderItems"></div>
        <div class="total">Total: ₹<span id="totalPrice">0</span></div>
        <button class="place-btn" onclick="placeOrder()">Place Order</button>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <h3>AL NOOR Jewellery</h3>
    <p>Luxury Jewellery | Elegant Designs | Premium Collection</p>
    <p>© 2026 AL NOOR. All Rights Reserved.</p>
</div>

<script>

/* ── TOAST ── */
function showToast(message){
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");
    setTimeout(()=>{ toast.classList.remove("show"); }, 2500);
}

/* ── SIDEBAR ── */
function toggleMenu(){
    let s  = document.getElementById("sidebar");
    let ov = document.getElementById("sidebarOverlay");
    let open = s.style.left === "0px";
    s.style.left = open ? "-270px" : "0px";
    ov.classList.toggle("active", !open);
}

function closeMenu(){
    document.getElementById("sidebar").style.left = "-270px";
    document.getElementById("sidebarOverlay").classList.remove("active");
}

/* ── LOAD CART ITEMS ── */
let cart  = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let orderItems = document.getElementById("orderItems");

cart.forEach((item)=>{
    let quantity = item.quantity || 1;
    let subtotal = item.price * quantity;
    total += subtotal;
    orderItems.innerHTML += `
    <div class="order-item">
        <div>${item.name}<br><small style="color:#aaa">Qty: ${quantity}</small></div>
        <span>₹${subtotal}</span>
    </div>`;
});

document.getElementById("totalPrice").innerText = total;

/* ── PLACE ORDER ── */
async function placeOrder(){
    let name    = document.getElementById("name").value.trim();
    let phone   = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();
    let city    = document.getElementById("city").value.trim();
    let pincode = document.getElementById("pincode").value.trim();
    let payment = document.getElementById("payment").value;

    if(!name || !phone || !address || !city || !pincode){
        showToast("Please fill all details");
        return;
    }

    let orderData = { name, phone, address, city, pincode, payment, products: cart, total };

    try{
        let response = await fetch("http://localhost:5000/place-order",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(orderData)
        });
        let data = await response.json();
        showToast(data.message);
        localStorage.removeItem("cart");
        setTimeout(()=>{ window.location.href = "ordersuccess.html"; }, 1000);
    }catch(err){
        showToast("Server Error. Please try again.");
    }
}

</script>
</body>
</html>
