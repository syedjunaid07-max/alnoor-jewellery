<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success - AL NOOR</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:'Poppins',sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    overflow-x:hidden;
}

body::-webkit-scrollbar{ width:8px; }
body::-webkit-scrollbar-thumb{ background:#d4af37; border-radius:10px; }

/* ─── SUCCESS BOX ─── */

.success-box{
    width:100%;
    max-width:600px;
    background:#1a1a1a;
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    animation:fadeIn 0.8s ease;
}

/* ─── CHECK CIRCLE ─── */

.check-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#d4af37;
    margin:0 auto 30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    color:black;
    font-weight:bold;
    animation:pop 0.8s ease;
}

/* ─── TEXT ─── */

.success-box h1{
    color:#d4af37;
    font-family:'Cinzel',serif;
    font-size:clamp(26px, 5vw, 42px);
    line-height:1.2;
    margin-bottom:18px;
}

.success-box p{
    color:#ccc;
    line-height:1.8;
    font-size:clamp(14px, 2vw, 17px);
    max-width:480px;
    margin:0 auto;
}

/* ─── ORDER ID ─── */

.order-id{
    margin-top:28px;
    background:#111;
    padding:18px 20px;
    border-radius:12px;
    font-size:clamp(15px, 2.5vw, 20px);
    color:#d4af37;
    font-weight:600;
    border:1px solid #333;
    word-break:break-all;
}

/* ─── BUTTON ─── */

.shop-btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 40px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    font-size:clamp(14px, 2vw, 16px);
    transition:0.3s;
}

.shop-btn:hover{
    background:white;
    transform:scale(1.05);
}

/* ─── ANIMATIONS ─── */

@keyframes pop{
    0%  { transform:scale(0); }
    80% { transform:scale(1.1); }
    100%{ transform:scale(1); }
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(30px); }
    to  { opacity:1; transform:translateY(0); }
}

/* ════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════ */

/* ── Tablet (max 768px) ── */
@media(max-width:768px){
    .success-box{
        padding:40px 28px;
        border-radius:20px;
    }

    .check-circle{
        width:100px;
        height:100px;
        font-size:50px;
    }

    .shop-btn{ padding:14px 32px; }
}

/* ── Mobile (max 480px) ── */
@media(max-width:480px){
    body{ padding:16px; align-items:flex-start; padding-top:40px; }

    .success-box{
        padding:32px 20px;
        border-radius:16px;
    }

    .check-circle{
        width:88px;
        height:88px;
        font-size:44px;
        margin-bottom:22px;
    }

    .success-box h1{ font-size:22px; }

    .success-box p{ font-size:13px; }

    .order-id{
        padding:14px 16px;
        font-size:14px;
        margin-top:20px;
    }

    .shop-btn{
        margin-top:24px;
        padding:13px 28px;
        font-size:14px;
        border-radius:10px;
    }
}

/* ── Very small (max 360px) ── */
@media(max-width:360px){
    .success-box{ padding:24px 14px; }
    .check-circle{ width:76px; height:76px; font-size:38px; }
    .success-box h1{ font-size:19px; }
}

</style>
</head>

<body>

<div class="success-box">

    <div class="check-circle">✓</div>

    <h1>Order Placed Successfully!</h1>

    <p>
        Thank you for shopping with AL NOOR Jewellery.
        Your order has been confirmed and will be delivered soon.
    </p>

    <div class="order-id">
        Order ID: <span id="orderId"></span>
    </div>

    <a href="shop.html" class="shop-btn">Continue Shopping</a>

</div>

<script>
let orderId = localStorage.getItem("orderId");
document.getElementById("orderId").innerText = orderId || "ALN000000";
</script>

</body>
</html>
